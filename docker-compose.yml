services:
  astra:
    build: .
    image: astra-agenticos
    container_name: astra-agenticos
    ports:
      - "5173:5173"          # → http://localhost:5173
    env_file:
      - ./ui/.env            # ANTHROPIC_API_KEY, MODEL (create from ui/.env.example)
    environment:
      - SEED_PROJECT_ROOT=/workspace     # the mounted code becomes the active project
      - SEED_PROJECT_NAME=Mounted workspace
      - STATE_DIR=/app/state             # projects + conversation history live here
    volumes:
      - ./workspace:/workspace:ro        # put the .NET codebase to analyse here (read-only)
      - ./artifacts:/app/artifacts       # generated deliverables persist to the host
      - ./data:/app/state                # conversation history + projects survive restarts
