services:
  astra:
    build: .
    image: astra-agenticos
    container_name: astra-agenticos
    ports:
      - "5173:5173"          # → http://localhost:5173
    env_file:
      - ./ui/.env            # ANTHROPIC_API_KEY, MODEL (create from ui/.env.example)
    environment:
      - SEED_PROJECT_ROOT=/workspace     # the mounted code becomes the active project
      - SEED_PROJECT_NAME=Mounted workspace
      # Everything that must outlive the container. Defaults live inside the image,
      # so these three settings are what make the app stateful.
      - STATE_DIR=/app/state             # projects.json + conversation history
      - ARTIFACTS_DIR=/app/artifacts     # generated BRDs / ADRs / test plans
      - WORKSPACE_DIR=/app/state/repos   # checkouts of git-backed projects
    volumes:
      - ./workspace:/workspace:ro        # put the .NET codebase to analyse here (read-only)
      - ./artifacts:/app/artifacts       # generated deliverables persist to the host
      - ./data:/app/state                # history, projects and cloned repos survive restarts
